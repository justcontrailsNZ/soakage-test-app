<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soakage Test Experiment</title>
    <!-- Import Chart.js for the graphing -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f6f8;
            color: #333;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .panel {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            flex: 1;
            min-width: 400px;
        }
        .controls {
            margin-bottom: 15px;
            background-color: #e9ecef;
            padding: 10px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        select {
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 1em;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #f8f9fa;
        }
        input {
            width: 70px;
            padding: 6px;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        input:focus {
            outline: none;
            border-color: #007bff;
        }
        .time-input {
            background-color: #e9ecef;
            font-weight: bold;
        }
        .btn-add {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9em;
            transition: background 0.2s;
        }
        .btn-add:hover {
            background-color: #218838;
        }
        .slope-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #e3f2fd;
            border-radius: 6px;
            border-left: 5px solid #2196F3;
        }
        .slope-grid {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }
        .slope-item {
            text-align: center;
            font-size: 1.1em;
        }
        .slope-item span {
            font-weight: bold;
            display: block;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <h1>Soakage Test Tracker</h1>

    <div class="container">
        <!-- LEFT PANEL: TABLE -->
        <div class="panel">
            <h2 style="margin-top: 0;">Data Input</h2>
            
            <div class="controls">
                <label for="intervalSelect"><strong>Set Time Interval:</strong></label>
                <select id="intervalSelect" onchange="changeInterval()">
                    <option value="3">3 minutes</option>
                    <option value="5">5 minutes</option>
                    <option value="10" selected>10 minutes</option>
                </select>
                <span style="font-size: 0.85em; color: #555;">(Auto-fills the time column)</span>
            </div>

            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Time (min)</th>
                        <th>Hole 1 (mm)</th>
                        <th>Hole 2 (mm)</th>
                        <th>Hole 3 (mm)</th>
                        <th>Hole 4 (mm)</th>
                        <th>Hole 5 (mm)</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Rows generated by JS -->
                </tbody>
            </table>
            
            <div style="text-align: center;">
                <button class="btn-add" onclick="addRow()">+ Add Row</button>
            </div>
        </div>

        <!-- RIGHT PANEL: GRAPH & SLOPES -->
        <div class="panel">
            <h2 style="margin-top: 0;">Depth vs Time Graph</h2>
            <canvas id="soakageChart" height="200"></canvas>
            
            <div class="slope-box">
                <h3 style="margin-top: 0;">Calculated Slopes (Rate of Change)</h3>
                <p style="margin: 0 0 10px 0; font-size: 0.9em; color: #555;">Calculated via linear regression (mm/min)</p>
                <div class="slope-grid">
                    <div class="slope-item">Hole 1 <span id="slope0" style="color: #FF6384;">N/A</span></div>
                    <div class="slope-item">Hole 2 <span id="slope1" style="color: #36A2EB;">N/A</span></div>
                    <div class="slope-item">Hole 3 <span id="slope2" style="color: #4BC0C0;">N/A</span></div>
                    <div class="slope-item">Hole 4 <span id="slope3" style="color: #FF9F40;">N/A</span></div>
                    <div class="slope-item">Hole 5 <span id="slope4" style="color: #9966FF;">N/A</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let rowCount = 10; // Starts with 10 rows
        const NUM_HOLES = 5;
        
        // Colors for the 5 holes
        const colors = ['#FF6384', '#36A2EB', '#4BC0C0', '#FF9F40', '#9966FF'];

        // Initialize Table
        const tbody = document.getElementById('tableBody');
        for (let i = 0; i < rowCount; i++) {
            createRow(i);
        }

        // Function to create a row in the table
        function createRow(rowIndex) {
            const interval = parseInt(document.getElementById('intervalSelect').value);
            const tr = document.createElement('tr');
            
            // Time column
            const tdTime = document.createElement('td');
            tdTime.innerHTML = `<input type="number" class="time-input" value="${rowIndex * interval}" oninput="updateData()">`;
            tr.appendChild(tdTime);

            // 5 Hole columns
            for (let h = 0; h < NUM_HOLES; h++) {
                const tdHole = document.createElement('td');
                tdHole.innerHTML = `<input type="number" class="hole-input hole-${h}" placeholder="0" oninput="updateData()">`;
                tr.appendChild(tdHole);
            }
            tbody.appendChild(tr);
        }

        // Function triggered by the "+ Add Row" button
        function addRow() {
            createRow(rowCount);
            rowCount++;
            updateData(); // Refresh the graph and calculations to include the new empty row
        }

        // Initialize Chart.js
        const ctx = document.getElementById('soakageChart').getContext('2d');
        const datasets = [];
        for (let h = 0; h < NUM_HOLES; h++) {
            datasets.push({
                label: `Hole ${h + 1}`,
                data: Array(rowCount).fill(null),
                borderColor: colors[h],
                backgroundColor: colors[h],
                fill: false,
                tension: 0 // keeps lines straight point-to-point
            });
        }

        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: rowCount}, (_, i) => i * parseInt(document.getElementById('intervalSelect').value)),
                datasets: datasets
            },
            options: {
                responsive: true,
                scales: {
                    x: {
                        title: { display: true, text: 'Time (minutes)', font: { weight: 'bold' } }
                    },
                    y: {
                        title: { display: true, text: 'Depth (mm)', font: { weight: 'bold' } },
                        beginAtZero: true
                    }
                }
            }
        });

        // Function triggered when dropdown is changed
        function changeInterval() {
            const interval = parseInt(document.getElementById('intervalSelect').value);
            const timeInputs = document.querySelectorAll('.time-input');
            
            // Loop through time inputs and update them
            timeInputs.forEach((input, index) => {
                input.value = index * interval;
            });
            
            // Automatically refresh the graph and slopes with the new times
            updateData();
        }

        // Calculate Slope using Linear Regression for highest accuracy
        function calculateSlope(xArr, yArr) {
            let validX = [], validY = [];
            for(let i=0; i<xArr.length; i++) {
                if(!isNaN(yArr[i]) && yArr[i] !== null) {
                    validX.push(xArr[i]);
                    validY.push(yArr[i]);
                }
            }
            
            let n = validX.length;
            if (n < 2) return null; // Need at least 2 points to make a line

            let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
            for (let i = 0; i < n; i++) {
                sumX += validX[i];
                sumY += validY[i];
                sumXY += validX[i] * validY[i];
                sumXX += validX[i] * validX[i];
            }
            let slope = ((n * sumXY) - (sumX * sumY)) / ((n * sumXX) - (sumX * sumX));
            return slope;
        }

        // Function triggered every time a user types in a box
        function updateData() {
            // Get all time values
            const timeInputs = document.querySelectorAll('.time-input');
            const times = Array.from(timeInputs).map(inp => parseFloat(inp.value));
            
            // Update X-axis labels on graph
            chart.data.labels = times;

            // Process each hole
            for (let h = 0; h < NUM_HOLES; h++) {
                const holeInputs = document.querySelectorAll(`.hole-${h}`);
                const holeData = Array.from(holeInputs).map(inp => inp.value === "" ? null : parseFloat(inp.value));
                
                // Update graph line
                chart.data.datasets[h].data = holeData;

                // Calculate and display slope
                const slope = calculateSlope(times, holeData);
                const slopeDisplay = document.getElementById(`slope${h}`);
                if (slope !== null) {
                    slopeDisplay.innerText = slope.toFixed(3) + " mm/min";
                } else {
                    slopeDisplay.innerText = "N/A";
                }
            }
            
            // Redraw graph
            chart.update();
        }
    </script>
</body>
</html>
